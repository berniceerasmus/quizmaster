<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d1f">
<title>QuizMaster Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0d0d1f;overflow:hidden;font-family:'Nunito',sans-serif}
#root{height:100%;display:flex;justify-content:center;align-items:stretch}

.app{width:100%;max-width:430px;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* ── THEME ── */
.dark{--bg:#0d0d1f;--surf:#161630;--card:#1f1f45;--card2:#27275a;--bdr:#2d2d60;--txt:#f0f0ff;--txt2:#8888bb;--shadow:0 4px 24px rgba(0,0,0,.5)}
.light{--bg:#f0f0ff;--surf:#e8e8ff;--card:#ffffff;--card2:#eeeefc;--bdr:#ccccee;--txt:#1a1a3f;--txt2:#5a5a9a;--shadow:0 4px 24px rgba(100,100,200,.15)}

/* ── COLOURS ── */
:root{
  --ind:#6366f1;--ind2:#818cf8;
  --cyan:#22d3ee;--cyan2:#67e8f9;
  --yel:#fbbf24;--yel2:#fde68a;
  --grn:#34d399;--grn2:#6ee7b7;
  --red:#f87171;--red2:#fca5a5;
  --pink:#ec4899;--org:#f97316;
  --pur:#a855f7;
  --en:#3b82f6;--de:#6b7280;--es:#ef4444;--fr:#2563eb;--it:#16a34a;--tr:#dc2626;
  --geo:#0284c7;--sci:#7c3aed;--his:#92400e;--cul:#be185d;
}

/* ── LAYOUT ── */
.screen{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow-y:auto;overflow-x:hidden;animation:fadeIn .3s ease}
.screen::-webkit-scrollbar{display:none}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
@keyframes correct{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-80px);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes levelUpAnim{0%{transform:translateY(60px) scale(.8);opacity:0}20%{transform:translateY(0) scale(1.05);opacity:1}80%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-60px);opacity:0}}
@keyframes barFill{from{width:0}to{width:var(--w)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ── SPLASH ── */
.splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;background:radial-gradient(ellipse at 50% 30%,#1e1b4b 0%,var(--bg) 70%);padding:40px 24px}
.splash-logo{font-family:'Fredoka One';font-size:48px;color:#fff;text-align:center;line-height:1.1;text-shadow:0 0 40px rgba(99,102,241,.8)}
.splash-sub{font-size:15px;color:var(--ind2);text-align:center;font-weight:600}
.splash-emoji{font-size:72px;animation:bounce 2s ease-in-out infinite}
.lang-btns{display:flex;gap:16px;width:100%}
.lang-btn{flex:1;padding:16px;border-radius:16px;border:2px solid var(--bdr);background:var(--card);color:var(--txt);font-family:'Fredoka One';font-size:18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.lang-btn:hover,.lang-btn.active{border-color:var(--ind);background:var(--ind);color:#fff;transform:scale(1.04)}
.splash-continue{width:100%;padding:18px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--ind),var(--pur));color:#fff;font-family:'Fredoka One';font-size:20px;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(99,102,241,.4)}
.splash-continue:hover{transform:scale(1.03);box-shadow:0 6px 28px rgba(99,102,241,.6)}
.splash-continue:active{transform:scale(.97)}

/* ── HEADER ── */
.header{display:flex;align-items:center;padding:12px 16px 8px;gap:10px;background:var(--surf);border-bottom:1px solid var(--bdr)}
.btn-back{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--bdr);background:var(--card);color:var(--txt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.btn-back:hover{background:var(--card2);transform:scale(1.08)}
.header-title{flex:1;font-family:'Fredoka One';font-size:17px;color:var(--txt);text-align:center}
.dark-toggle{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--bdr);background:var(--card);color:var(--txt);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}

/* ── XP BAR ── */
.xp-bar-wrap{padding:10px 16px;background:var(--surf);border-bottom:1px solid var(--bdr)}
.xp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.xp-level{font-family:'Fredoka One';font-size:14px;color:var(--ind2)}
.xp-pts{font-size:12px;color:var(--txt2);font-weight:600}
.xp-track{height:8px;background:var(--card2);border-radius:99px;overflow:hidden}
.xp-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--ind),var(--cyan));transition:width .6s cubic-bezier(.34,1.56,.64,1)}

/* ── HOME ── */
.home-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.home-greeting{font-family:'Fredoka One';font-size:22px;color:var(--txt);text-align:center;padding:4px 0}
.main-cards{display:flex;flex-direction:column;gap:12px}
.main-card{border-radius:20px;padding:24px 20px;border:1.5px solid var(--bdr);background:var(--card);cursor:pointer;transition:all .22s;display:flex;align-items:center;gap:18px;box-shadow:var(--shadow)}
.main-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.3);border-color:var(--accent)}
.main-card:active{transform:scale(.97)}
.card-lang{--accent:var(--ind);border-color:rgba(99,102,241,.3);background:linear-gradient(135deg,var(--card) 60%,rgba(99,102,241,.12))}
.card-lang:hover{border-color:var(--ind)}
.card-quiz{--accent:var(--cyan);border-color:rgba(34,211,238,.3);background:linear-gradient(135deg,var(--card) 60%,rgba(34,211,238,.12))}
.card-quiz:hover{border-color:var(--cyan)}
.card-emoji{font-size:42px}
.card-info h2{font-family:'Fredoka One';font-size:20px;color:var(--txt);margin-bottom:4px}
.card-info p{font-size:13px;color:var(--txt2);line-height:1.4}
.card-arrow{margin-left:auto;font-size:22px;color:var(--txt2)}

/* ── SELECT GRIDS ── */
.select-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.section-title{font-family:'Fredoka One';font-size:18px;color:var(--txt);margin-bottom:4px}
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.items-grid.single{grid-template-columns:1fr}
.item-card{border-radius:18px;padding:18px 16px;border:1.5px solid var(--bdr);background:var(--card);cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:var(--shadow)}
.item-card:hover{transform:translateY(-2px);border-color:var(--c,var(--ind))}
.item-card:active{transform:scale(.96)}
.item-card .ic-emoji{font-size:32px}
.item-card .ic-name{font-family:'Fredoka One';font-size:15px;color:var(--txt)}
.item-card .ic-sub{font-size:11px;color:var(--txt2);font-weight:600}
.mode-card{border-radius:20px;padding:22px 20px;border:1.5px solid var(--bdr);background:var(--card);cursor:pointer;transition:all .22s;display:flex;align-items:center;gap:18px;box-shadow:var(--shadow)}
.mode-card:hover{transform:translateY(-3px)}
.mode-card:active{transform:scale(.97)}
.mode-emoji{font-size:40px}
.mode-info h3{font-family:'Fredoka One';font-size:18px;color:var(--txt);margin-bottom:4px}
.mode-info p{font-size:12px;color:var(--txt2);line-height:1.4}

/* ── GAME HEADER ── */
.game-hdr{display:flex;align-items:center;padding:12px 16px;background:var(--surf);border-bottom:1px solid var(--bdr);gap:10px}
.g-score{flex:1;text-align:center}
.g-score-val{font-family:'Fredoka One';font-size:22px;color:var(--yel)}
.g-score-lbl{font-size:10px;color:var(--txt2);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.g-streak{display:flex;flex-direction:column;align-items:center}
.g-streak-val{font-family:'Fredoka One';font-size:18px;color:var(--org)}
.g-streak-lbl{font-size:10px;color:var(--txt2);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.q-progress{padding:10px 16px;background:var(--surf)}
.q-prog-txt{font-size:11px;color:var(--txt2);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.q-prog-track{height:6px;background:var(--card2);border-radius:99px;overflow:hidden}
.q-prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--ind),var(--cyan));transition:width .4s ease}

/* ── MC GAME ── */
.mc-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.timer-row{display:flex;justify-content:center}
.q-card{background:var(--card);border-radius:20px;padding:22px 18px;border:1.5px solid var(--bdr);text-align:center;box-shadow:var(--shadow)}
.q-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-bottom:8px}
.q-word{font-family:'Fredoka One';font-size:28px;color:var(--txt);line-height:1.2}
.q-text{font-size:15px;color:var(--txt);font-weight:700;line-height:1.5}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-btn{padding:14px 10px;border-radius:14px;border:1.5px solid var(--bdr);background:var(--card);color:var(--txt);font-family:'Nunito';font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;text-align:center;line-height:1.3}
.opt-btn:hover:not(:disabled){background:var(--card2);border-color:var(--ind);transform:scale(1.03)}
.opt-btn:active:not(:disabled){transform:scale(.97)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{background:rgba(52,211,153,.25);border-color:var(--grn);color:var(--grn);animation:correct .3s ease}
.opt-btn.wrong{background:rgba(248,113,113,.2);border-color:var(--red);color:var(--red);animation:shake .3s ease}
.opt-btn.reveal{background:rgba(52,211,153,.15);border-color:var(--grn);color:var(--grn)}

/* ── FEEDBACK ── */
.feedback-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:100;pointer-events:none}
.feedback-bubble{font-family:'Fredoka One';font-size:26px;padding:18px 32px;border-radius:20px;animation:popIn .2s ease;backdrop-filter:blur(8px)}
.fb-correct{background:rgba(52,211,153,.9);color:#fff}
.fb-wrong{background:rgba(248,113,113,.9);color:#fff}
.fb-timeup{background:rgba(251,191,36,.9);color:#1a1a1a}

/* ── TIMER CIRCLE ── */
.timer-circle{position:relative;display:inline-flex;align-items:center;justify-content:center}
.timer-svg{transform:rotate(-90deg)}
.timer-num{position:absolute;font-family:'Fredoka One';font-size:18px;font-weight:bold}

/* ── WORD MATCH ── */
.match-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.match-instruction{font-size:13px;color:var(--txt2);text-align:center;font-weight:600}
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-col-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);text-align:center;padding-bottom:4px}
.match-word{padding:14px 10px;border-radius:14px;border:1.5px solid var(--bdr);background:var(--card);color:var(--txt);font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;text-align:center;line-height:1.3;min-height:52px;display:flex;align-items:center;justify-content:center}
.match-word:hover:not(.matched):not(.disabled){background:var(--card2);transform:scale(1.03)}
.match-word.selected{border-color:var(--ind);background:rgba(99,102,241,.25);color:var(--ind2);transform:scale(1.04)}
.match-word.matched{border-color:var(--grn);background:rgba(52,211,153,.2);color:var(--grn);cursor:default;opacity:.7}
.match-word.wrong-flash{border-color:var(--red);background:rgba(248,113,113,.2);color:var(--red);animation:shake .3s ease}
.match-word.disabled{cursor:default;opacity:.5}
.match-progress{padding:4px 0;text-align:center;font-size:13px;color:var(--txt2);font-weight:700}

/* ── RESULT ── */
.result-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 20px;gap:16px;overflow-y:auto;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.2) 0%,var(--bg) 60%)}
.result-emoji{font-size:64px;animation:bounce 1.5s ease-in-out infinite;margin-top:8px}
.result-title{font-family:'Fredoka One';font-size:28px;color:var(--txt);text-align:center}
.result-cards{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.result-card{background:var(--card);border-radius:18px;padding:18px 14px;text-align:center;border:1.5px solid var(--bdr);box-shadow:var(--shadow)}
.result-card-val{font-family:'Fredoka One';font-size:30px;margin-bottom:4px}
.result-card-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2)}
.result-xp-section{width:100%;background:var(--card);border-radius:18px;padding:18px;border:1.5px solid var(--bdr);box-shadow:var(--shadow)}
.result-xp-title{font-family:'Fredoka One';font-size:16px;color:var(--txt);margin-bottom:12px;display:flex;justify-content:space-between}
.result-btns{width:100%;display:flex;flex-direction:column;gap:10px;margin-top:4px}
.btn-primary{padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--ind),var(--pur));color:#fff;font-family:'Fredoka One';font-size:18px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(99,102,241,.4)}
.btn-primary:hover{transform:scale(1.03);box-shadow:0 6px 24px rgba(99,102,241,.6)}
.btn-primary:active{transform:scale(.97)}
.btn-sec{padding:14px;border-radius:14px;border:1.5px solid var(--bdr);background:var(--card);color:var(--txt);font-family:'Fredoka One';font-size:16px;cursor:pointer;transition:all .2s}
.btn-sec:hover{background:var(--card2)}

/* ── LEVEL UP MODAL ── */
.level-modal{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.level-modal-box{background:var(--card);border-radius:24px;padding:36px 28px;text-align:center;border:1.5px solid var(--ind);box-shadow:0 0 60px rgba(99,102,241,.4);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);max-width:280px;width:90%}
.lm-emoji{font-size:56px;margin-bottom:8px}
.lm-title{font-family:'Fredoka One';font-size:28px;color:var(--ind2);margin-bottom:8px}
.lm-level{font-family:'Fredoka One';font-size:48px;color:var(--yel);text-shadow:0 0 30px rgba(251,191,36,.5)}
.lm-sub{font-size:14px;color:var(--txt2);margin-top:8px}

/* ── FLOAT LABELS ── */
.float-label{position:absolute;pointer-events:none;font-family:'Fredoka One';font-size:22px;color:var(--grn);z-index:150;animation:floatUp .8s ease forwards}

/* ── UTILITY ── */
.text-ind{color:var(--ind2)}
.text-yel{color:var(--yel)}
.text-grn{color:var(--grn)}
.text-red{color:var(--red)}
.text-cyan{color:var(--cyan)}
</style>
</head>

// ══════════════════════════════════════════════════
// XP / LEVEL UTILS
// ══════════════════════════════════════════════════
const xpForLevel = (lvl) => lvl * 100;
const totalXpForLevel = (lvl) => { let s=0; for(let i=1;i<lvl;i++) s+=xpForLevel(i); return s; };

const computeLevel = (totalXp) => {
  let lvl=1, acc=0;
  while(true){ const need=xpForLevel(lvl); if(acc+need>totalXp) break; acc+=need; lvl++; }
  const prevAcc=totalXpForLevel(lvl);
  const need=xpForLevel(lvl);
  const progress=totalXp-prevAcc;
  return { level:lvl, progress, need, pct:Math.min(100,(progress/need)*100) };
};

// ══════════════════════════════════════════════════
// TIMER CIRCLE
// ══════════════════════════════════════════════════
function TimerCircle({ timeLeft, maxTime }) {
  const r=26, circ=2*Math.PI*r;
  const prog=(timeLeft/maxTime)*circ;
  const col = timeLeft<=5?'var(--red)':timeLeft<=10?'var(--yel)':'var(--grn)';
  return (
    <div className="timer-circle">
      <svg width={64} height={64} className="timer-svg">
        <circle cx={32} cy={32} r={r} fill="none" stroke="var(--bdr)" strokeWidth={5}/>
        <circle cx={32} cy={32} r={r} fill="none" stroke={col} strokeWidth={5}
          strokeDasharray={circ} strokeDashoffset={circ-prog} strokeLinecap="round"
          style={{transition:'stroke-dashoffset 1s linear,stroke .3s'}}/>
      </svg>
      <span className="timer-num" style={{color:col,animation:timeLeft<=5?'pulse .5s infinite':''}}>{timeLeft}</span>
    </div>
  );
}

// ══════════════════════════════════════════════════
// XP BAR
// ══════════════════════════════════════════════════
function XpBar({ totalXp, t }) {
  const { level, progress, need, pct } = computeLevel(totalXp);
  return (
    <div className="xp-bar-wrap">
      <div className="xp-row">
        <span className="xp-level">⭐ {t.level} {level}</span>
        <span className="xp-pts">{progress} / {need} {t.xp}</span>
      </div>
      <div className="xp-track">
        <div className="xp-fill" style={{width:`${pct}%`}}/>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// MULTIPLE CHOICE GAME
// ══════════════════════════════════════════════════
const TIME_LIMIT = 20;
const QUESTIONS_COUNT = 8;

function MultipleChoiceGame({ t, questions, onComplete, onBack }) {
  const langKey = t===T.tr?'tr':'en';
  const qs = useRef(shuffle(questions).slice(0, QUESTIONS_COUNT));
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [timeLeft, setTimeLeft] = useState(TIME_LIMIT);
  const [score, setScore] = useState(0);
  const [streak, setStreak] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [xpGained, setXpGained] = useState(0);
  const [floats, setFloats] = useState([]);
  const containerRef = useRef(null);

  const curQ = qs.current[idx];
  const total = qs.current.length;

  // Timer
  useEffect(()=>{
    if(answered) return;
    if(timeLeft<=0){ handleAnswer(-1); return; }
    const tm=setTimeout(()=>setTimeLeft(x=>x-1),1000);
    return ()=>clearTimeout(tm);
  },[timeLeft,answered]);

  useEffect(()=>{ setTimeLeft(TIME_LIMIT); setAnswered(false); setSelected(null); },[idx]);

  const addFloat = (text) => {
    const id = Date.now();
    const x = 40+Math.random()*120;
    setFloats(f=>[...f,{id,text,x}]);
    setTimeout(()=>setFloats(f=>f.filter(fl=>fl.id!==id)),900);
  };

  const handleAnswer = (optIdx) => {
    if(answered) return;
    setAnswered(true);
    setSelected(optIdx);
    const correct = optIdx === curQ.a;
    if(correct){
      const bonus = Math.min(streak,5)*5;
      const gained = 10+bonus;
      setScore(s=>s+1);
      setStreak(s=>s+1);
      setXpGained(x=>x+gained);
      setFeedback('correct');
      addFloat(`+${gained} XP`);
    } else {
      if(optIdx===-1) setFeedback('timeup');
      else setFeedback('wrong');
      setStreak(0);
    }
    setTimeout(()=>{
      setFeedback(null);
      if(idx+1 < total) setIdx(i=>i+1);
      else onComplete({ score: correct?score+1:score, total, xpGained: xpGained+(correct?10+Math.min(streak,5)*5:0) });
    },900);
  };

  return (
    <div className="screen" style={{position:'relative'}} ref={containerRef}>
      <div className="game-hdr">
        <button className="btn-back" onClick={onBack}>✕</button>
        <div className="g-score">
          <div className="g-score-val">{score}</div>
          <div className="g-score-lbl">{t.score}</div>
        </div>
        <TimerCircle timeLeft={timeLeft} maxTime={TIME_LIMIT}/>
        <div className="g-streak">
          <div className="g-streak-val">🔥{streak}</div>
          <div className="g-streak-lbl">{t.streak}</div>
        </div>
      </div>
      <div className="q-progress">
        <div className="q-prog-txt">{t.q} {idx+1} {t.of} {total}</div>
        <div className="q-prog-track">
          <div className="q-prog-fill" style={{width:`${((idx+1)/total)*100}%`}}/>
        </div>
      </div>
      <div className="mc-body">
        <div className="q-card" style={{animation:idx?'fadeIn .25s ease':'none'}}>
          <div className="q-label">{t.chooseAns}</div>
          <div className="q-text">{langKey==='tr'?curQ.qt:curQ.qe}</div>
        </div>
        <div className="options-grid">
          {curQ.opts.map((opt,i)=>{
            let cls='opt-btn';
            if(answered){
              if(i===curQ.a) cls+=' correct';
              else if(i===selected) cls+=' wrong';
            }
            return (
              <button key={i} className={cls} disabled={answered} onClick={()=>handleAnswer(i)}>
                {opt}
              </button>
            );
          })}
        </div>
      </div>
      {feedback && (
        <div className="feedback-overlay">
          <div className={`feedback-bubble ${feedback==='correct'?'fb-correct':feedback==='wrong'?'fb-wrong':'fb-timeup'}`}>
            {feedback==='correct'?t.correct:feedback==='wrong'?t.wrong:t.timeup}
          </div>
        </div>
      )}
      {floats.map(fl=>(
        <div key={fl.id} className="float-label" style={{left:fl.x,bottom:'40%'}}>{fl.text}</div>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════════
// WORD MATCH GAME
// ══════════════════════════════════════════════════
const PAIRS_PER_ROUND = 4;

function WordMatchGame({ t, pairs, isLangMode, targetLang, onComplete, onBack }) {
  const langKey = t===T.tr?'tr':'en';
  const allPairs = useRef(shuffle(pairs));
  const rounds = Math.floor(allPairs.current.length / PAIRS_PER_ROUND);
  const [round, setRound] = useState(0);
  const [matchedCount, setMatchedCount] = useState(0);
  const [selLeft, setSelLeft] = useState(null);
  const [selRight, setSelRight] = useState(null);
  const [matched, setMatched] = useState(new Set());
  const [matchedRight, setMatchedRight] = useState(new Set());
  const [wrongLeft, setWrongLeft] = useState(null);
  const [wrongRight, setWrongRight] = useState(null);
  const [xpGained, setXpGained] = useState(0);
  const [errors, setErrors] = useState(0);
  const [floats, setFloats] = useState([]);
  const busy = useRef(false);

  const roundPairs = allPairs.current.slice(round*PAIRS_PER_ROUND, (round+1)*PAIRS_PER_ROUND);
  const leftWords = roundPairs.map(p=>p.w);
  const rightShuffled = useRef(shuffle(roundPairs.map(p=>p.t)));

  useEffect(()=>{
    rightShuffled.current = shuffle(allPairs.current.slice(round*PAIRS_PER_ROUND,(round+1)*PAIRS_PER_ROUND).map(p=>p.t));
  },[round]);

  const addFloat=(text,left)=>{
    const id=Date.now()+Math.random();
    setFloats(f=>[...f,{id,text,left}]);
    setTimeout(()=>setFloats(f=>f.filter(fl=>fl.id!==id)),800);
  };

  const handleLeft = (i) => {
    if(matched.has(i)||busy.current) return;
    setSelLeft(i);
    if(selRight!==null) checkMatch(i, selRight);
  };

  const handleRight = (i) => {
    if(matchedRight.has(rightShuffled.current[i])||busy.current) return;
    setSelRight(i);
    if(selLeft!==null) checkMatch(selLeft, i);
  };

  const checkMatch = (li, ri) => {
    const lWord = leftWords[li];
    const rWord = rightShuffled.current[ri];
    const pair = roundPairs.find(p=>p.w===lWord);
    if(pair && pair.t===rWord){
      busy.current=true;
      setMatched(m=>new Set([...m,li]));
      setMatchedRight(m=>new Set([...m,rWord]));
      setSelLeft(null); setSelRight(null);
      const gained=15;
      setXpGained(x=>x+gained);
      addFloat(`+${gained}`,true);
      const newCount = matchedCount+1;
      setMatchedCount(newCount);
      busy.current=false;
      if(newCount===PAIRS_PER_ROUND){
        setTimeout(()=>{
          if(round+1<rounds){
            setRound(r=>r+1);
            setMatched(new Set()); setMatchedRight(new Set());
            setSelLeft(null); setSelRight(null);
            setMatchedCount(0);
          } else {
            onComplete({ score: allPairs.current.length-errors, total:allPairs.current.length, xpGained:xpGained+gained });
          }
        },600);
      }
    } else {
      busy.current=true;
      setErrors(e=>e+1);
      setWrongLeft(li); setWrongRight(ri);
      setTimeout(()=>{ setWrongLeft(null); setWrongRight(null); setSelLeft(null); setSelRight(null); busy.current=false; },600);
    }
  };

  const totalPairs = allPairs.current.length;
  const completedPairs = round*PAIRS_PER_ROUND + matchedCount;

  return (
    <div className="screen" style={{position:'relative'}}>
      <div className="game-hdr">
        <button className="btn-back" onClick={onBack}>✕</button>
        <div className="g-score">
          <div className="g-score-val">{completedPairs}</div>
          <div className="g-score-lbl">{t.pairs}</div>
        </div>
        <div style={{width:36}}/>
        <div className="g-streak">
          <div className="g-streak-val">{xpGained}</div>
          <div className="g-streak-lbl">{t.xp}</div>
        </div>
      </div>
      <div className="q-progress">
        <div className="q-prog-txt">{t.roundOf} {round+1} {t.of} {rounds}</div>
        <div className="q-prog-track">
          <div className="q-prog-fill" style={{width:`${(completedPairs/totalPairs)*100}%`}}/>
        </div>
      </div>
      <div className="match-body">
        <p className="match-instruction">{t.matchInstr}</p>
        <div className="match-cols">
          <div className="match-col">
            <div className="match-col-lbl">{isLangMode ? (targetLang==='tr'?'Türkçe':'Target') : '—'}</div>
            {leftWords.map((w,i)=>(
              <div key={i}
                className={`match-word ${matched.has(i)?'matched':''} ${selLeft===i&&!matched.has(i)?'selected':''} ${wrongLeft===i?'wrong-flash':''}`}
                onClick={()=>handleLeft(i)}>
                {w}
              </div>
            ))}
          </div>
          <div className="match-col">
            <div className="match-col-lbl">{isLangMode ? (targetLang==='tr'?'English':'Türkçe') : '—'}</div>
            {rightShuffled.current.map((w,i)=>(
              <div key={i}
                className={`match-word ${matchedRight.has(w)?'matched':''} ${selRight===i&&!matchedRight.has(w)?'selected':''} ${wrongRight===i?'wrong-flash':''}`}
                onClick={()=>handleRight(i)}>
                {w}
              </div>
            ))}
          </div>
        </div>
        <div className="match-progress">
          {Array.from({length:totalPairs},(_,i)=>(
            <span key={i} style={{fontSize:14,margin:'0 2px',opacity:i<completedPairs?1:.3}}>
              {i<completedPairs?'✅':'⬜'}
            </span>
          ))}
        </div>
      </div>
      {floats.map(fl=>(
        <div key={fl.id} className="float-label" style={{left:fl.left?'30%':'60%',bottom:'40%'}}>{fl.text}</div>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════════
// RESULT SCREEN
// ══════════════════════════════════════════════════
function ResultScreen({ t, result, totalXp, onPlayAgain, onHome }) {
  const { score, total, xpGained } = result;
  const pct = Math.round((score/total)*100);
  const { level, pct:lvlPct, progress, need } = computeLevel(totalXp);
  const rating = pct===100?t.excellent:pct>=75?t.great:pct>=50?t.good:t.ok;
  const emoji = pct===100?'🏆':pct>=75?'⭐':pct>=50?'👍':'💪';

  return (
    <div className="screen result-screen">
      <div className="result-emoji">{emoji}</div>
      <div className="result-title">{rating}</div>
      <div className="result-cards">
        <div className="result-card">
          <div className="result-card-val text-grn">{score}<span style={{fontSize:16,color:'var(--txt2)'}}>/{total}</span></div>
          <div className="result-card-lbl">{t.correctAns}</div>
        </div>
        <div className="result-card">
          <div className="result-card-val text-yel">+{xpGained}</div>
          <div className="result-card-lbl">{t.xpEarned}</div>
        </div>
      </div>
      <div className="result-card" style={{width:'100%',padding:'18px 16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
          <span style={{fontFamily:'Fredoka One',fontSize:15,color:'var(--txt)'}}>⭐ {t.level} {level}</span>
          <span style={{fontSize:12,color:'var(--txt2)',fontWeight:600}}>{progress}/{need} {t.xp}</span>
        </div>
        <div className="xp-track">
          <div className="xp-fill" style={{width:`${lvlPct}%`}}/>
        </div>
      </div>
      <div className="result-btns">
        <button className="btn-primary" onClick={onPlayAgain}>🔄 {t.playAgain}</button>
        <button className="btn-sec" onClick={onHome}>🏠 {t.goHome}</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════
const SCREENS = { SPLASH:'splash', HOME:'home', LANG_SEL:'langSel', CAT_SEL:'catSel', MODE_SEL:'modeSel', GAME:'game', RESULT:'result' };

function App() {
  const [screen, setScreen] = useState(SCREENS.SPLASH);
  const [lang, setLang] = useState('tr');
  const [darkMode, setDarkMode] = useState(true);
  const [gameType, setGameType] = useState(null);
  const [selItem, setSelItem] = useState(null);
  const [gameMode, setGameMode] = useState(null);
  const [totalXp, setTotalXp] = useState(0);
  const [prevLevel, setPrevLevel] = useState(1);
  const [levelUpShow, setLevelUpShow] = useState(false);
  const [newLevel, setNewLevel] = useState(1);
  const [result, setResult] = useState(null);
  const t = T[lang];

  const go = (s) => setScreen(s);

  const handleGameComplete = (res) => {
    setResult(res);
    const oldLvl = computeLevel(totalXp).level;
    const newTotal = totalXp + res.xpGained;
    setTotalXp(newTotal);
    const newLvl = computeLevel(newTotal).level;
    if(newLvl > oldLvl){
      setNewLevel(newLvl);
      setLevelUpShow(true);
    }
    go(SCREENS.RESULT);
  };

  const getQuestions = () => {
    if(gameType==='language') return LANG_DATA[selItem]?.mc || [];
    return QUIZ_DATA[selItem]?.qs.map(q=>({
      qt:q.qt, qe:q.qe, opts:q.opts, a:q.a
    })) || [];
  };

  const getPairs = () => {
    if(gameType==='language') return LANG_DATA[selItem]?.pairs || [];
    return [];
  };

  const getModeLabel = () => {
    if(gameType==='language'){
      const lk = lang==='tr'?'tr':'en';
      return LANG_DATA[selItem]?.name[lk] || '';
    }
    const lk = lang==='tr'?'tr':'en';
    return QUIZ_DATA[selItem]?.name[lk] || '';
  };

  const themeClass = `app ${darkMode?'dark':'light'}`;

  return (
    <div className={themeClass} style={{background:'var(--bg)'}}>
      {screen===SCREENS.SPLASH && (
        <SplashScreen onStart={(l)=>{ setLang(l); go(SCREENS.HOME); }} darkMode={darkMode} setDarkMode={setDarkMode}/>
      )}
      {screen===SCREENS.HOME && (
        <div className="screen">
          <HomeScreen t={t} totalXp={totalXp}
            onLang={()=>{ setGameType('language'); go(SCREENS.LANG_SEL); }}
            onQuiz={()=>{ setGameType('quiz'); go(SCREENS.CAT_SEL); }}
            darkMode={darkMode} setDarkMode={setDarkMode}/>
        </div>
      )}
      {screen===SCREENS.LANG_SEL && (
        <div className="screen">
          <LangSelectScreen t={t} onBack={()=>go(SCREENS.HOME)} onSelect={(k)=>{ setSelItem(k); go(SCREENS.MODE_SEL); }}/>
        </div>
      )}
      {screen===SCREENS.CAT_SEL && (
        <div className="screen">
          <CategorySelectScreen t={t} onBack={()=>go(SCREENS.HOME)} onSelect={(k)=>{ setSelItem(k); go(SCREENS.MODE_SEL); }}/>
        </div>
      )}
      {screen===SCREENS.MODE_SEL && (
        <div className="screen">
          <ModeSelectScreen t={t} label={getModeLabel()} onBack={()=>go(gameType==='language'?SCREENS.LANG_SEL:SCREENS.CAT_SEL)}
            onSelect={(m)=>{ setGameMode(m); go(SCREENS.GAME); }}/>
        </div>
      )}
      {screen===SCREENS.GAME && gameMode==='mc' && (
        <MultipleChoiceGame t={t} questions={getQuestions()}
          onComplete={handleGameComplete} onBack={()=>go(SCREENS.MODE_SEL)}/>
      )}
      {screen===SCREENS.GAME && gameMode==='match' && (
        <WordMatchGame t={t} pairs={getPairs()} isLangMode={gameType==='language'}
          targetLang={selItem}
          onComplete={handleGameComplete} onBack={()=>go(SCREENS.MODE_SEL)}/>
      )}
      {screen===SCREENS.RESULT && result && (
        <div className="screen">
          <ResultScreen t={t} result={result} totalXp={totalXp}
            onPlayAgain={()=>go(SCREENS.GAME)}
            onHome={()=>go(SCREENS.HOME)}/>
        </div>
      )}
      {levelUpShow && <LevelUpModal t={t} level={newLevel} onClose={()=>setLevelUpShow(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
